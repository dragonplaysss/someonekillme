server:
  port: 2333
  address: 127.0.0.1

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: false
      vimeo: true
      nico: false
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - TV
    # The section below fixes the "Sign in" and "Bot" errors
    ratelimit:
      strategy: "rotate-on-ban"
      ipBlocks: ["2603:c024:8008:400::/64"]
      searchTriggersFail: true
      retryLimit: 10
    clientOptions:
      TV:
        searching: false
        videoLoading: false
        playlistLoading: false
    oauth:
      enabled: ${YOUTUBE_OAUTH_ENABLED:false}
      refreshToken: "${YOUTUBE_OAUTH_REFRESH_TOKEN:}"
      skipInitialization: ${YOUTUBE_OAUTH_SKIP_INITIALIZATION:false}
    # youtube-plugin 1.18.1 does not support cookie/cookies file keys.
    # Cookies are only used by the bot's yt-dlp fallback via YTDLP_COOKIES_FILE.

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube.http.YoutubeOauth2Handler: INFO
