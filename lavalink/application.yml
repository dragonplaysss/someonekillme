server:
  port: 2333
  address: 127.0.0.1

lavalink:
  plugins:
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: false
      vimeo: true
      nico: false
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 1200
    frameBufferDurationMs: 7000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    playerUpdateInterval: 5
    youtubeSearchEnabled: false
    soundcloudSearchEnabled: true

plugins:
  lavasrc:
    providers:
      - "scsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: true
      deezer: ${DEEZER_ENABLED:false}
      yandexmusic: false
      flowerytts: false
      youtube: false
      vkmusic: false
      tidal: false
      qobuz: false
      ytdlp: true
      jiosaavn: false
    lyrics-sources:
      spotify: false
      deezer: false
      youtube: false
      yandexmusic: false
      vkmusic: false
      lrcLib: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "${MUSIC_COUNTRY_CODE:US}"
      playlistLoadLimit: 3
      albumLoadLimit: 3
      resolveArtistsInSearch: true
      localFiles: false
      preferAnonymousToken: false
    applemusic:
      countryCode: "${MUSIC_COUNTRY_CODE:US}"
      playlistLoadLimit: 3
      albumLoadLimit: 3
    deezer:
      masterDecryptionKey: "${DEEZER_MASTER_KEY:}"
      arl: "${DEEZER_ARL:}"
      formats: ["MP3_128", "MP3_64", "AAC_64"]
    ytdlp:
      path: "${YTDLP_EXECUTABLE:yt-dlp}"
      searchLimit: 5
      mixPlaylistLoadLimit: 10
      playlistLoadLimit: 50
      customLoadArgs:
        - "-q"
        - "--no-warnings"
        - "--force-ipv4"
        - "--source-address"
        - "0.0.0.0"
        - "--remote-components"
        - "ejs:github"
        - "--socket-timeout"
        - "20"
        - "--retries"
        - "5"
        - "--extractor-retries"
        - "4"
        - "--flat-playlist"
        - "--skip-download"
        - "-J"
      customPlaybackArgs:
        - "-q"
        - "--no-warnings"
        - "--force-ipv4"
        - "--source-address"
        - "0.0.0.0"
        - "--remote-components"
        - "ejs:github"
        - "--socket-timeout"
        - "20"
        - "--retries"
        - "5"
        - "--extractor-retries"
        - "4"
        - "-f"
        - "bestaudio[acodec=opus][protocol^=http]/bestaudio[ext=m4a][protocol^=http]/bestaudio[protocol^=http]/bestaudio/best"
        - "-J"

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
